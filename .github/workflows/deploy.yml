name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  IMAGE_NAME: gcp-ats-analyzer
  REGISTRY_REGION: us-central1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication to Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY_REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ats-analyzer/${{ env.IMAGE_NAME }}:${{ github.sha }} ./app
          docker tag ${{ env.REGISTRY_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ats-analyzer/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ats-analyzer/${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ats-analyzer/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ats-analyzer/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: gcp-ats-analyzer-dev
          region: ${{ env.REGISTRY_REGION }}
          image: ${{ env.REGISTRY_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ats-analyzer/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: --allow-unauthenticated --set-env-vars=ENVIRONMENT=dev

      - name: Output Cloud Run URL
        run: |
          echo "Cloud Run service deployed successfully!"
          gcloud run services describe gcp-ats-analyzer-dev --region ${{ env.REGISTRY_REGION }} --format='value(status.url)'
