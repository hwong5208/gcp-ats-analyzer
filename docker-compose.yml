version: '3.8'

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LOCAL_LLM_ENDPOINT=${LOCAL_LLM_ENDPOINT}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL}
    volumes:
      # Mount app code for hot reload during development
      - ./app:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt --quiet &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Allow container to access host network for local LLM
    extra_hosts:
      - "host.docker.internal:host-gateway"
